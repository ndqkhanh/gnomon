services:
  gnomon:
    build:
      context: .
      dockerfile: Containerfile
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HARNESS_LLM_MODEL=${HARNESS_LLM_MODEL:-claude-3-5-sonnet-latest}
    ports:
      - "${GNOMON_PORT:-8011}:8011"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/healthz', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
